<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 14</title>
    <script src="js/ejercicio14.js"></script>
    <link rel="stylesheet" href="css/ejercicio13.css">
</head>

<body>
    <div class="contenedor-formulario">
        <h1>Calduladora de arreglos </h1>
        <div class="grupo-formulario">
            <label for="numeros">Ingrese una serie de numeros separados por comas</label>
            <input type="text" id="numeros" placeholder="Ej. 1,2,3">
        </div>
        <button type="button" onclick="calcular()">Calcular</button>
        <div class="grupo-formulario">
            <label for="numero_mayor">Numero Mayor:</label>
            <textarea readonly id="numero_mayor" placeholder="Numero Mayor"></textarea>
            <label for="numero_menor">Numero Menor:</label>
            <textarea readonly id="numero_menor" placeholder="Numero Menor"></textarea>
            <label for="promedio">Promedio de los numeros ingresados:</label>
            <textarea readonly id="promedio" placeholder="Promedio Final"></textarea>
        </div>
    </div>
</body>

</html>
