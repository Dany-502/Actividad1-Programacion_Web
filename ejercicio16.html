<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 16: Calculadora de operaciones basicas</title>
    <script src="js/ejercicio16.js"></script>
    <link rel="stylesheet" href="css/ejercicio16.css">
</head>

<body>
    <div class="contenedor-formulario">
        <h1>Calculadora de operaciones basicas</h1>
        <div class="grupo-formulario">
            <label for="numero1">Numero 1:</label>
            <input type="number" id="numero1" placeholder="Ingrese el primer numero">
        </div>
        <div class="grupo-formulario">
            <label for="numero2">Numero 2:</label>
            <input type="number" id="numero2" placeholder="Ingrese el segundo numero">
        </div>
        <div class="grupo-formulario">
            <label for="operacion">Selecciona la operacion:</label>
            <button type="button" onclick="calcularOperacion('suma')">Sumar</button>
            <button type="button" onclick="calcularOperacion('resta')">Restar</button>
            <button type="button" onclick="calcularOperacion('multiplicacion')">Multiplicar</button>
            <button type="button" onclick="calcularOperacion('division')">Dividir</button>
        </div>
        <div class="grupo-formulario">
            <label for="resultado">Resultado:</label>
            <textarea readonly id="resultado" placeholder="Resultado"></textarea>
        </div>
    </div>
</body>

</html>
