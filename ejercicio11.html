<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 11: Convertidor de Kilometros a Millas</title>
    <script src="js/ejercicio11.js"></script>
    <link rel="stylesheet" href="css/ejercicio11.css">
</head>

<body>
    <div class="contenedor-formulario">
        <h1>Convertidor de Kilometros a Millas</h1>
        <hr>
        <div class="grupo-formulario">
            <label for="kilometros">Ingrese la distancia en Kilometros(Km):</label>
            <input type="number" id="kilometros" placeholder="Ej.15" required min="1">
        </div>

        <button type="button" onclick="conversion()">Convertir</button>

        <div class="grupo-formulario">
            <label for="resultado">Distancia en Millas</label>
            <textarea readonly id="resultado" placeholder="Resultado"></textarea>
        </div>
    </div>
</body>

</html>
