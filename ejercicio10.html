<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora: Convierte grados Celsius a Fahrenheit</title>
    <script src="js/ejercicio10.js"></script>
    <link rel="stylesheet" href="css/ejercicio10.css">

</head>

<body>
    <div class="contenedor-formulario">
        <h1>Calculadora de Celsius a Fahrenheit</h1>
        <hr>

        <div class="grupo-formulario">
            <label for="celsius">Grados Celsius (°C):</label>
            <input type="number" id="celsius" placeholder="Ej. 20">
        </div>

        <button type="button" onclick="conversion()">Convertir</button>

        <div class="grupo-formulario">
            <label for="resultado">Grados Fahrenheit (°F):</label>
            <textarea readonly id="resultado" placeholder="Resultado"></textarea>
        </div>
    </div>

</body>

</html>
